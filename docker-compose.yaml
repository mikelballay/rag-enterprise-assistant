version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    restart: always
    ports:
      - "6333:6333"  # Puerto para la API REST
      - "6334:6334"  # Puerto para comunicación interna (gRPC)
    volumes:
      # Esto asegura que si apagas el contenedor, NO pierdas los datos
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334